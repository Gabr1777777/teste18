<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XatSpace Ultra</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Poppins',sans-serif;
    background:black;
    color:white;
    overflow-x:hidden;
}

/* CURSOR NEON */
.cursor{
    width:15px;height:15px;
    border-radius:50%;
    position:fixed;
    background:#00c6ff;
    pointer-events:none;
    box-shadow:0 0 20px #00c6ff,0 0 40px #ff00cc;
}

/* FUNDO */
canvas{position:fixed;top:0;left:0;z-index:-1}

/* TELA */
#welcome{
    position:fixed;
    width:100%;height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    z-index:999;
    animation:fadeOut 2s forwards;
    animation-delay:3s;
}

#welcome h1{
    font-size:2.5rem;
    color:#fff;
    text-shadow:0 0 10px #00c6ff,0 0 20px #ff00cc;
    animation:glitch 1s infinite alternate;
}

@keyframes glitch{
    from{transform:translate(1px,1px);}
    to{transform:translate(-1px,-1px);}
}

@keyframes fadeOut{
    to{opacity:0;visibility:hidden;}
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:15px;
    padding:20px;
}

nav button{
    padding:10px 20px;
    border-radius:25px;
    border:none;
    cursor:pointer;
    background:linear-gradient(45deg,#00c6ff,#ff00cc);
    color:white;
    transition:0.3s;
}

nav button.active{
    box-shadow:0 0 20px #ff00cc;
    transform:scale(1.1);
}

/* SEÇÕES */
.section{display:none;padding:40px;text-align:center;}
.active-section{display:block;}

/* GALERIA */
.gallery img{
    width:150px;
    margin:10px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}
.gallery img:hover{transform:scale(1.1);}

/* LIGHTBOX */
#lightbox{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}
#lightbox img{
    max-width:90%;
    border-radius:10px;
}

/* PLAYER */
.music-card{
    max-width:300px;
    margin:auto;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    box-shadow:0 0 20px #00c6ff;
}

/* VISUALIZER */
.bars{
    display:flex;
    justify-content:center;
    gap:3px;
    margin:10px 0;
}
.bar{
    width:5px;
    height:20px;
    background:#00c6ff;
    animation:beat 1s infinite ease-in-out;
}
.bar:nth-child(2){animation-delay:0.2s;}
.bar:nth-child(3){animation-delay:0.4s;}
.bar:nth-child(4){animation-delay:0.6s;}

@keyframes beat{
    0%,100%{height:10px;}
    50%{height:30px;}
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>

<div id="welcome">
    <h1>Bem vindos ao meu xatspace</h1>
</div>

<nav>
<button onclick="show('home',this)" class="active">Início</button>
<button onclick="show('profile',this)">Perfil</button>
<button onclick="show('gallery',this)">Fotos</button>
<button onclick="show('music',this)">Música</button>
</nav>

<div id="home" class="section active-section">
<h1>Alex Rivera</h1>
<p>Perfil ultra moderno</p>
</div>

<div id="profile" class="section">
<p>Perfil completo futurista 🚀</p>
</div>

<div id="gallery" class="section gallery">
<img src="https://picsum.photos/300?1" onclick="openImg(this.src)">
<img src="https://picsum.photos/300?2" onclick="openImg(this.src)">
<img src="https://picsum.photos/300?3" onclick="openImg(this.src)">
</div>

<div id="lightbox" onclick="this.style.display='none'">
<img id="lightImg">
</div>

<div id="music" class="section">
<div class="music-card">
<button onclick="play()">▶</button>
<div class="bars">
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>
<audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>
</div>

<script>
// MENU
function show(id,btn){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active-section'));
document.getElementById(id).classList.add('active-section');

document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// LIGHTBOX
function openImg(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightImg").src=src;
}

// PLAYER
function play(){
const a=document.getElementById("audio");
a.paused?a.play():a.pause();
}

// CURSOR
document.addEventListener("mousemove",e=>{
const c=document.getElementById("cursor");
c.style.left=e.clientX+"px";
c.style.top=e.clientY+"px";
});

// FUNDO COM LINHAS
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let p=[];
for(let i=0;i<60;i++){
p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,dx:Math.random()-0.5,dy:Math.random()-0.5});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

p.forEach(a=>{
a.x+=a.dx;a.y+=a.dy;

ctx.beginPath();
ctx.arc(a.x,a.y,2,0,Math.PI*2);
ctx.fillStyle="#00c6ff";
ctx.fill();

p.forEach(b=>{
let dist=Math.hypot(a.x-b.x,a.y-b.y);
if(dist<100){
ctx.strokeStyle="rgba(0,198,255,0.1)";
ctx.beginPath();
ctx.moveTo(a.x,a.y);
ctx.lineTo(b.x,b.y);
ctx.stroke();
}
});
});

requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
