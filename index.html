<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiTech | Assistência Técnica Especializada</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #6e00ff;
            --bg-dark: #050505;
            --card-bg: #121214;
            --text-main: #ffffff;
            --text-dim: #a1a1a1;
            --whatsapp-green: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #1a1a2e, #050505);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(12px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .logo { font-size: 1.6rem; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        .btn-contact {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-contact:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5); }

        /* Hero Section */
        .hero {
            padding: 180px 8% 100px;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .hero p { font-size: 1.2rem; color: var(--text-dim); max-width: 800px; margin: 0 auto 30px; }

        /* Grid de Serviços */
        .services-grid {
            padding: 60px 8%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #222;
            transition: 0.4s;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            background: rgba(18, 18, 20, 0.8);
        }

        .card h3 { color: var(--primary); margin-bottom: 15px; font-size: 1.4rem; }
        .card p { color: var(--text-dim); margin-bottom: 20px; }

        .btn-card {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Seção Leva e Trás */
        .delivery-info {
            background: linear-gradient(90deg, rgba(110, 0, 255, 0.1), rgba(0, 212, 255, 0.1));
            margin: 60px 8%;
            padding: 60px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .delivery-info h2 { font-size: 2.5rem; margin-bottom: 15px; }
        .badge { background: #ffcc00; color: #000; padding: 5px 15px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; display: inline-block; }

        /* Footer */
        footer {
            padding: 60px 8% 40px;
            text-align: center;
            background: #0a0a0c;
            border-top: 1px solid #222;
        }

        .footer-info { margin-bottom: 20px; color: var(--text-dim); }
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--whatsapp-green);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 999;
            transition: 0.3s;
        }
        .whatsapp-float:hover { transform: scale(1.1); }

        /* Responsividade */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.8rem; }
            header { padding: 15px 5%; }
            .delivery-info { padding: 30px; }
        }
    </style>
</head>

    </header>
