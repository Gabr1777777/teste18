<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Player Boteco Premium</title>
    <style>
        body {
            background: url('seu-fundo-rural.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Container Principal com efeito Glassmorphism */
        .player-container {
            width: 350px;
            background: rgba(30, 25, 20, 0.9);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-title {
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* Imagem da Capa */
        .cover-art {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .track-info {
            margin-bottom: 20px;
        }

        .artist-name { font-size: 14px; color: #ccc; }
        .song-title { font-size: 18px; font-weight: bold; margin: 5px 0; }
        .listeners { font-size: 12px; color: #888; }

        /* Controles */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 15px;
        }

        .play-btn {
            background: white;
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            width: 50%;
            cursor: pointer;
        }

        .volume-text { font-size: 12px; margin-top: 5px; text-align: right; }

        /* Barras de frequência (animação) */
        .visualizer {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-top: 20px;
        }

        .bar {
            width: 4px;
            height: 20px;
            background: white;
            animation: bounce 1s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { height: 10px; }
            50% { height: 25px; }
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="header-title">BOTECO PREMIUM</div>
    
    <img src="https://via.placeholder.com/300x300" alt="Capa" class="cover-art">

    <div class="track-info">
        <div class="artist-name">Guilherme & Benuto & Luan Santana</div>
        <div class="song-title">Quarto 67 Ao Vivo</div>
        <div class="listeners">Ouvintes: 7</div>
    </div>

    <div class="controls">
        <button class="play-btn" onclick="togglePlay()">
            <span>▶</span> PLAY
        </button>
        <input type="range" class="volume-slider" min="0" max="100" value="100">
    </div>
    <div class="volume-text">Volume: 100%</div>

    <div class="visualizer">
        <div class="bar"></div>
        <div class="bar" style="animation-delay: 0.2s"></div>
        <div class="bar" style="animation-delay: 0.4s"></div>
        <div class="bar" style="animation-delay: 0.6s"></div>
        <div class="bar" style="animation-delay: 0.8s"></div>
    </div>
</div>

<audio id="audio-stream" src="SUA_URL_DE_STREAM_AQUI"></audio>

<script>
    const audio = document.getElementById('audio-stream');
    function togglePlay() {
        if (audio.paused) {
            audio.play();
        } else {
            audio.pause();
        }
    }
</script>

</body>
</html>
