<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XatSpace - Alex</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
    background: black;
    color: white;
}

/* FUNDO ANIMADO */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* TELA INICIAL */
#welcome {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #000, #020024);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
    animation: fadeOut 2s ease forwards;
    animation-delay: 3s;
}

#welcome h1 {
    font-size: 2.5rem;
    background: linear-gradient(90deg, #00c6ff, #ff00cc);
    -webkit-background-clip: text;
    color: transparent;
    animation: zoom 2s ease;
}

@keyframes zoom {
    from {transform: scale(0.5); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

@keyframes fadeOut {
    to {opacity: 0; visibility: hidden;}
}

/* NAV */
nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 20px;
}

nav button {
    padding: 10px 20px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    background: linear-gradient(45deg, #00c6ff, #ff00cc);
    color: white;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 0 10px #00c6ff;
}

nav button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #ff00cc;
}

/* SEÇÕES */
.section {
    display: none;
    padding: 40px 20px;
    text-align: center;
    animation: fade 0.5s;
}

.active {
    display: block;
}

@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* PERFIL */
.profile-pic {
    width: 140px;
    border-radius: 50%;
    border: 3px solid #00c6ff;
    margin-bottom: 15px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* GALERIA */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.1);
}

/* PLAYER */
.music-btn {
    padding: 12px 20px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(45deg, #ff00cc, #00c6ff);
    cursor: pointer;
    color: white;
}

.player {
    margin-top: 20px;
    display: none;
}

</style>
</head>

<body>

<!-- FUNDO -->
<canvas id="bg"></canvas>

<!-- TELA INICIAL -->
<div id="welcome">
    <h1>Bem vindos ao meu xatspace</h1>
</div>

<!-- MENU -->
<nav>
    <button onclick="showSection('home')">Início</button>
    <button onclick="showSection('profile')">Perfil</button>
    <button onclick="showSection('gallery')">Fotos</button>
    <button onclick="showSection('music')">Música</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
    <img src="https://picsum.photos/300" class="profile-pic">
    <h1>Alex Rivera</h1>
    <p>25 anos • Leão</p>
    <p>"Vivendo intensamente."</p>
</div>

<!-- PERFIL -->
<div id="profile" class="section">
    <div class="card">
        <h2>Sobre Mim</h2>
        <p>Sou apaixonado por música, design e criatividade.</p>
        <p>Gosto de criar experiências visuais únicas e modernas.</p>
    </div>
</div>

<!-- GALERIA -->
<div id="gallery" class="section">
    <h2>Galeria</h2>
    <div class="gallery">
        <img src="https://picsum.photos/300?1">
        <img src="https://picsum.photos/300?2">
        <img src="https://picsum.photos/300?3">
        <img src="https://picsum.photos/300?4">
    </div>
</div>

<!-- MUSICA -->
<div id="music" class="section">
    <h2>Música</h2>
    <button class="music-btn" onclick="togglePlayer()">Abrir Player 🎧</button>
    <div id="player" class="player">
        <audio controls>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
        </audio>
    </div>
</div>

<script>
// TROCA DE SEÇÕES
function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// PLAYER
function togglePlayer() {
    const p = document.getElementById("player");
    p.style.display = p.style.display === "block" ? "none" : "block";
}

// FUNDO ANIMADO
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: Math.random() - 0.5,
        dy: Math.random() - 0.5
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00c6ff";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
